name: Auto-rebase open PRs on main push

# AISDLC-138: when a PR lands on main, rebase all OTHER open non-draft same-repo
# PRs onto current main. Mirrors dependabot's "always-current" behavior so PRs
# never sit BEHIND in the GitHub UI.
#
# AISDLC-189: must use a non-GITHUB_TOKEN credential for the rebase. GitHub's
# recursive-workflow-prevention rule blocks pushes made with `GITHUB_TOKEN`
# from triggering downstream workflows. With GITHUB_TOKEN, every rebase pass
# leaves the PR's new SHA with ZERO CI runs — the required `ai-sdlc/pr-ready`
# status never fires and the PR sits BLOCKED forever (witnessed today on
# PRs #299, #300, #302, #303, #304, #306; required manual empty-commit kicks
# to recover, often re-triggered by subsequent auto-rebase passes).
#
# Fix: use `secrets.AI_SDLC_PAT` (a fine-scoped PAT or GitHub App token).
# Pushes made with these credentials DO trigger downstream workflows.
#
# Operator setup (required after this PR merges):
# 1. Create a fine-grained PAT at https://github.com/settings/personal-access-tokens/new
#    with: contents:write + pull-requests:write on this repo, expiration ≤ 1 year
#    OR install a GitHub App with the same permissions and use actions/create-github-app-token
# 2. Add the token as a repo secret: `gh secret set AI_SDLC_PAT -b <token>`
# 3. Set a calendar reminder for token rotation
# 4. Verify: open a no-op PR, push to main on another, observe the rebased PR
#    re-fires its CI within 60s of the auto-rebase
#
# Until the secret is set, the workflow falls back to GITHUB_TOKEN and emits
# a ::warning:: in the run log — operators see degraded behavior (PRs need
# manual re-kicks) but the workflow doesn't fail outright.
#
# Failure modes (intentional):
# - PR has conflicts → gh pr update-branch --rebase fails for that PR; loop
#   continues; operator handles the conflict manually
# - PR is from a fork → skipped by head-repository filter (token can't push)
# - Concurrent main pushes → concurrency group serializes
# - The PR was already up-to-date → gh pr update-branch returns gracefully
# - AI_SDLC_PAT unset → fallback to GITHUB_TOKEN with warning

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Serialize across overlapping main pushes; do NOT cancel in-progress runs
# (we want every push's rebase pass to complete).
concurrency:
  group: auto-rebase-open-prs
  cancel-in-progress: false

jobs:
  rebase:
    name: Rebase open PRs
    runs-on: ubuntu-latest
    steps:
      - name: Rebase all open same-repo non-draft PRs
        # AISDLC-189: prefer secrets.AI_SDLC_PAT so the rebase push
        # triggers downstream workflows. Fall back to github.token (which
        # does NOT trigger workflows) and warn so operators notice the gap.
        env:
          GH_TOKEN: ${{ secrets.AI_SDLC_PAT || github.token }}
          USING_FALLBACK_TOKEN: ${{ secrets.AI_SDLC_PAT == '' }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          # AISDLC-495 / DEC-0010: under strict-false branch protection, proactively
          # rebasing open PRs onto main is unnecessary (AISDLC-491 made v6 attestation
          # rebase-invariant for disjoint PRs) and actively harmful — the rebase re-stales
          # the attestation (envelope signed against a tree without the just-merged changes).
          # Skip unless branch protection still requires up-to-date.
          STRICT=$(gh api "repos/$REPO/branches/main/protection/required_status_checks" --jq '.strict' 2>/dev/null || echo "false")
          if [ "$STRICT" != "true" ]; then
            echo "branch protection strict=$STRICT — skipping proactive rebase (AISDLC-495 / DEC-0010 trunk-based posture)."
            exit 0
          fi

          # AISDLC-189: warn if we fell back to GITHUB_TOKEN — the rebase
          # will succeed but downstream workflows won't fire on the new SHA.
          if [ "$USING_FALLBACK_TOKEN" = "true" ]; then
            echo "::warning::AI_SDLC_PAT secret unset — falling back to GITHUB_TOKEN. Rebased PR SHAs will NOT trigger downstream workflows; operators must manually re-kick. See .github/workflows/auto-rebase-open-prs.yml header for setup."
          fi

          # List open non-draft PRs from same repo (forks excluded — workflow
          # token can't push to fork branches).
          PRS=$(gh pr list \
            --repo "$REPO" \
            --state open \
            --json number,isDraft,headRepositoryOwner,title \
            --jq ".[] | select(.isDraft == false) | select(.headRepositoryOwner.login == \"$OWNER\") | \"\(.number)\t\(.title)\"")

          if [ -z "$PRS" ]; then
            echo "No open non-draft same-repo PRs to rebase."
            exit 0
          fi

          REBASED=0
          SKIPPED=0
          FAILED=0
          REARMED=0
          while IFS=$'\t' read -r PR TITLE; do
            [ -z "$PR" ] && continue
            echo ""
            echo "=== PR #$PR — $TITLE ==="

            # AISDLC-213 / AISDLC-211 root cause #4:
            # GitHub clears autoMergeRequest when any force-push occurs — including
            # the force-push this workflow makes to advance the PR branch onto main.
            # Strategy: capture auto-merge state BEFORE the rebase, then re-arm AFTER.
            #
            # Queue method vs. workflow flag quirk (feedback_gh_auto_merge_method_quirk.md):
            # The merge queue's mergeMethod is SQUASH; the gh flag used here MUST be the
            # opposite — --rebase — or GitHub leaves the PR perpetually UNSTABLE in the
            # queue. auto-enable-auto-merge.yml (AISDLC-138) also uses --auto --rebase
            # for the same reason. If the queue method ever flips, flip this flag too.
            # Soft-fail: if PR closed/deleted between gh pr list and this view,
            # default to "false" so set -euo pipefail doesn't abort the whole loop.
            WAS_ARMED=$(gh pr view "$PR" --repo "$REPO" --json autoMergeRequest --jq '.autoMergeRequest != null' 2>/dev/null) || WAS_ARMED="false"
            echo "  auto-merge was armed: $WAS_ARMED"

            if gh pr update-branch --repo "$REPO" --rebase "$PR" 2>&1; then
              REBASED=$((REBASED + 1))

              # Re-arm auto-merge only for PRs that had it armed before the
              # force-push. Skips PRs that never had auto-merge, so we don't
              # accidentally enable it. Closes AISDLC-211 root cause #4.
              if [ "$WAS_ARMED" = "true" ]; then
                echo "  Re-arming auto-merge (cleared by force-push) with --auto --rebase"
                if gh pr merge "$PR" --repo "$REPO" --auto --rebase 2>&1; then
                  REARMED=$((REARMED + 1))
                  echo "  auto-merge re-armed successfully"
                else
                  echo "  ::warning::Failed to re-arm auto-merge for PR #$PR — operator may need to re-arm manually"
                fi
              fi
            else
              # Could be: already up-to-date (treated as success by gh in some
              # versions), conflicts, branch-protection, etc. Log and continue.
              RC=$?
              if [ "$RC" -eq 0 ]; then
                SKIPPED=$((SKIPPED + 1))
              else
                echo "  (skipped — likely already up-to-date or has conflicts; check PR for details)"
                FAILED=$((FAILED + 1))
              fi
            fi
          done <<< "$PRS"

          echo ""
          echo "Summary: rebased=$REBASED skipped=$SKIPPED failed=$FAILED rearmed=$REARMED"
