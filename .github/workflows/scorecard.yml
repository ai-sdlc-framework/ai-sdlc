name: OpenSSF Scorecard

# Continuous supply-chain posture scoring (OpenSSF Scorecard). Publishes results
# to the Security tab and (via publish_results) to the public Scorecard API so a
# badge can be displayed — a trust signal for downstream OSS adopters.

on:
  branch_protection_rule:
  schedule:
    - cron: '32 4 * * 1' # Mondays 04:32 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to the Security tab
      id-token: write # publish_results: sign the Scorecard result
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          sarif_file: results.sarif
