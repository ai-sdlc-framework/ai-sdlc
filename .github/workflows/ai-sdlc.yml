name: AI-SDLC Agent

on:
  issues:
    types: [labeled]

# Note: permissions block applies to the default GITHUB_TOKEN.
# The AI_SDLC_PAT secret is used for git push and PR creation so that
# the resulting events trigger the CI workflow (GITHUB_TOKEN cannot).
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ── Gate: require security triage before agent execution ──────────
  triage-gate:
    name: Triage Gate
    runs-on: ubuntu-latest
    if: github.event.label.name == 'ai-eligible'
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Check for triage-passed label
        id: check
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
            });
            const labels = issue.data.labels.map(l => typeof l === 'string' ? l : l.name);
            const passed = labels.includes('triage-passed');

            if (!passed) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: '## AI-SDLC: Blocked by Security Triage\n\nThis issue must pass security triage before the AI agent can work on it.\n\n1. Add the `security-triage` label to trigger analysis\n2. Wait for the triage to pass\n3. Re-apply the `ai-eligible` label after triage passes\n\nCurrent labels: ' + labels.join(', ')
              });
            }

            core.setOutput('approved', passed ? 'true' : 'false');
            core.info(`Triage gate: ${passed ? 'PASSED' : 'BLOCKED'} (labels: ${labels.join(', ')})`);

  # ── Agent pipeline (only runs after triage gate passes) ───────────
  agent:
    name: AI Agent Pipeline
    runs-on: ubuntu-latest
    needs: triage-gate
    if: needs.triage-gate.outputs.approved == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Use PAT so git push triggers CI on the resulting PR
          token: ${{ secrets.AI_SDLC_PAT }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install NVIDIA OpenShell
        run: |
          curl -LsSf https://raw.githubusercontent.com/NVIDIA/OpenShell/main/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        continue-on-error: true

      - name: Configure git
        run: |
          git config user.name "ai-sdlc[bot]"
          git config user.email "ai-sdlc-bot@users.noreply.github.com"

      - name: Run AI-SDLC pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.AI_SDLC_PAT }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          AI_SDLC_LINT_COMMAND: pnpm lint
          AI_SDLC_FORMAT_COMMAND: pnpm format:check
          AI_SDLC_TYPECHECK_COMMAND: pnpm build
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: C0APASXUPM1
          # AI_SDLC_SANDBOX_PROVIDER: openshell  # Disabled: OpenShell install may fail silently on runner, causing pipeline to hang
        run: pnpm --filter @ai-sdlc/dogfood execute --issue ${{ github.event.issue.number }}

      - name: Collect pipeline artifacts
        if: always()
        run: |
          mkdir -p .ai-sdlc
          cp /tmp/ai-sdlc-diagnostics-audit.jsonl .ai-sdlc/diagnostics-audit.jsonl 2>/dev/null || true

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ai-sdlc-run-issue-${{ github.event.issue.number }}
          path: .ai-sdlc/
          if-no-files-found: ignore
          retention-days: 30

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '## AI-SDLC: Pipeline Failed\n\nThe AI agent pipeline failed. See the [workflow run](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for details.'
            });
