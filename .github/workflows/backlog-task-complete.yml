name: backlog-task-complete

# Auto-close backlog tasks when a PR with `(AISDLC-N)` in its title merges.
# Opens a follow-up PR (rather than committing directly to main) so the move is
# auditable and respects branch protection.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  close-backlog-task:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Extract backlog task ID from PR title
        id: parse
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          # Match (AISDLC-N) or (AISDLC-N.M) at the end of the title.
          if [[ "$PR_TITLE" =~ \(([Aa][Ii][Ss][Dd][Ll][Cc]-[0-9]+(\.[0-9]+)?)\) ]]; then
            TASK_ID="${BASH_REMATCH[1]^^}"
            # Normalise the prefix letters to uppercase but keep numbers intact.
            TASK_ID="$(echo "$TASK_ID" | sed -E 's/^aisdlc/AISDLC/i')"
            echo "task_id=${TASK_ID}" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Detected backlog task: ${TASK_ID}"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No (AISDLC-N) marker in PR title — skipping."
          fi

      - name: Checkout
        if: steps.parse.outputs.found == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        if: steps.parse.outputs.found == 'true'
        run: |
          git config user.name "ai-sdlc-bot"
          git config user.email "ai-sdlc-bot@users.noreply.github.com"

      - name: Run close script
        id: close
        if: steps.parse.outputs.found == 'true'
        env:
          TASK_ID: ${{ steps.parse.outputs.task_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set +e
          ./scripts/close-backlog-task.sh "$TASK_ID" \
            --final-summary "Auto-closed by backlog-task-complete workflow after PR ${PR_URL} merged."
          rc=$?
          if [ $rc -eq 2 ]; then
            echo "already_closed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          exit $rc

      - name: Open follow-up PR
        if: steps.parse.outputs.found == 'true' && steps.close.outputs.already_closed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK_ID: ${{ steps.parse.outputs.task_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          BRANCH="chore/close-${TASK_ID,,}"
          git checkout -b "$BRANCH"
          git commit -m "chore(backlog): close ${TASK_ID} after #${PR_NUMBER} merged" \
            -m "Auto-closed by backlog-task-complete workflow." \
            -m "Source PR: ${PR_URL}"
          git push origin "$BRANCH"
          BODY="Auto-generated by \`.github/workflows/backlog-task-complete.yml\` after PR #${PR_NUMBER} merged."$'\n\n'
          BODY+="Moves \`backlog/tasks/${TASK_ID,,} - *.md\` to \`backlog/completed/\` and flips frontmatter status to \`Done\`."$'\n\n'
          BODY+="Source PR: ${PR_URL}"$'\n\n'
          BODY+="Merge or close as appropriate."$'\n\n'
          BODY+="Auto-generated by ai-sdlc"
          gh pr create \
            --title "chore: close ${TASK_ID} (auto)" \
            --body "$BODY"
