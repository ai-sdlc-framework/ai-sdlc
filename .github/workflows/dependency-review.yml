name: Dependency Review

# Blocks PRs that introduce dependencies with known vulnerabilities or
# disallowed licenses, before they reach main. Runs only on pull_request
# (the action requires the PR diff) and reads the dependency graph — no code
# from the PR is executed.

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post the summary comment
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
