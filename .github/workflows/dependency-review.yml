name: Dependency Review

# Blocks PRs that introduce dependencies with known high+ severity
# vulnerabilities, before they reach main. Requires the repo's Dependency Graph
# (enabled 2026-05-30) + automatic dependency submission for full transitive
# coverage of the pnpm graph.
#
# FRICTION CONTROL (issue #780): paths-filtered to dependency-manifest changes
# only — the vast majority of PRs never trigger this workflow, so it adds no
# per-PR cost. It runs (and can block) only when deps actually change. This
# workflow is allowlisted in __tests__/no-new-pr-gate.test.mjs as a deliberate,
# reviewed per-PR gate.

on:
  pull_request:
    paths:
      - '**/package.json'
      - 'pnpm-lock.yaml'
      - 'package-lock.json'
      - 'yarn.lock'

permissions:
  contents: read

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post the summary comment on failure
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
