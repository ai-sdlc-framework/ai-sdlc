name: CodeQL

# Static analysis for the TypeScript/JavaScript sources. build-mode: none means
# CodeQL analyzes the source directly without compiling — appropriate for this
# ESM/TS monorepo and avoids running any build scripts.
#
# NOTE: if CodeQL "default setup" is enabled in repo Settings → Code security,
# it must be disabled before this advanced workflow can run (GitHub rejects
# both being active simultaneously).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1' # Mondays 03:27 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload results to the Security tab
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          category: '/language:${{ matrix.language }}'
