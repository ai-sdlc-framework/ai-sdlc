name: AI-SDLC Fix CI

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: fix-ci-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  fix-ci:
    name: Fix CI Failures
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      startsWith(github.event.workflow_run.head_branch, 'ai-sdlc/issue-')
    steps:
      - name: Extract PR number
        id: pr
        env:
          WORKFLOW_RUN: ${{ toJSON(github.event.workflow_run) }}
        run: |
          PR=$(echo "$WORKFLOW_RUN" | jq '.pull_requests[0].number // empty')
          if [ -z "$PR" ]; then
            echo "No PR found for this workflow run. Skipping."
            exit 0
          fi
          echo "number=$PR" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: steps.pr.outputs.number
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.AI_SDLC_PAT }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        if: steps.pr.outputs.number

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.pr.outputs.number
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: steps.pr.outputs.number

      - run: pnpm build
        if: steps.pr.outputs.number

      - name: Install Claude Code CLI
        if: steps.pr.outputs.number
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        if: steps.pr.outputs.number
        run: |
          git config user.name "ai-sdlc[bot]"
          git config user.email "ai-sdlc-bot@users.noreply.github.com"

      - name: Run fix-CI pipeline
        if: steps.pr.outputs.number
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.AI_SDLC_PAT }}
          # gh CLI uses GH_TOKEN; default token has actions:read for log fetching
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          PR=${{ steps.pr.outputs.number }}
          RUN_ID=${{ github.event.workflow_run.id }}
          pnpm --filter @ai-sdlc/dogfood fix-ci --pr "$PR" --run-id "$RUN_ID"

      - name: Collect pipeline artifacts
        if: always() && steps.pr.outputs.number
        run: |
          mkdir -p .ai-sdlc
          cp /tmp/ai-sdlc-diagnostics-audit.jsonl .ai-sdlc/diagnostics-audit.jsonl 2>/dev/null || true

      - name: Upload pipeline artifacts
        if: always() && steps.pr.outputs.number
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ai-sdlc-fix-ci-pr-${{ steps.pr.outputs.number }}
          path: .ai-sdlc/
          if-no-files-found: ignore
          retention-days: 30
