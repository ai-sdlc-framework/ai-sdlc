name: AI-SDLC Fix CI

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: read

concurrency:
  group: fix-ci-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  fix-ci:
    name: Fix CI Failures
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read
    # SECURITY (issue #780, CodeQL actions/untrusted-checkout): this job runs in
    # the privileged workflow_run context with secrets (AI_SDLC_PAT write token +
    # ANTHROPIC_API_KEY) and checks out + builds the PR-head code. It MUST only
    # ever act on SAME-REPO branches. The head_repository == repository guard
    # rejects fork-originated runs (the head_branch prefix check alone is NOT a
    # security boundary — a forker can name their branch `ai-sdlc/issue-*`).
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      startsWith(github.event.workflow_run.head_branch, 'ai-sdlc/issue-')
    steps:
      - name: Extract PR number
        id: pr
        env:
          WORKFLOW_RUN: ${{ toJSON(github.event.workflow_run) }}
        run: |
          PR=$(echo "$WORKFLOW_RUN" | jq '.pull_requests[0].number // empty')
          if [ -z "$PR" ]; then
            echo "No PR found for this workflow run. Skipping."
            exit 0
          fi
          echo "number=$PR" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.pr.outputs.number
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.AI_SDLC_PAT }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        if: steps.pr.outputs.number

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.pr.outputs.number
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: steps.pr.outputs.number

      - run: pnpm build
        if: steps.pr.outputs.number

      - name: Install Claude Code CLI
        if: steps.pr.outputs.number
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        if: steps.pr.outputs.number
        run: |
          git config user.name "ai-sdlc[bot]"
          git config user.email "ai-sdlc-bot@users.noreply.github.com"

      - name: Run fix-CI pipeline
        if: steps.pr.outputs.number
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.AI_SDLC_PAT }}
          # gh CLI uses GH_TOKEN; default token has actions:read for log fetching
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Pass run-context values via env (not inline ${{ }} in run:) to avoid
          # script-injection (CodeQL actions/code-injection, issue #780).
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          pnpm --filter @ai-sdlc/dogfood fix-ci --pr "$PR_NUMBER" --run-id "$WORKFLOW_RUN_ID"

      - name: Collect pipeline artifacts
        if: always() && steps.pr.outputs.number
        run: |
          mkdir -p .ai-sdlc
          cp /tmp/ai-sdlc-diagnostics-audit.jsonl .ai-sdlc/diagnostics-audit.jsonl 2>/dev/null || true

      - name: Upload pipeline artifacts
        if: always() && steps.pr.outputs.number
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ai-sdlc-fix-ci-pr-${{ steps.pr.outputs.number }}
          path: .ai-sdlc/
          if-no-files-found: ignore
          retention-days: 30
