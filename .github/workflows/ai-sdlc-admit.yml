name: AI-SDLC Issue Admission

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read

jobs:
  score:
    name: Score Issue
    runs-on: ubuntu-latest
    # Skip if issue already has any pipeline labels
    if: >-
      !contains(toJSON(github.event.issue.labels.*.name), 'security-triage') &&
      !contains(toJSON(github.event.issue.labels.*.name), 'triage-passed') &&
      !contains(toJSON(github.event.issue.labels.*.name), 'ai-eligible') &&
      !contains(toJSON(github.event.issue.labels.*.name), 'security-rejected')
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Write issue body to file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: printf '%s' "$ISSUE_BODY" > /tmp/issue-body.txt

      - name: Detect .ai-sdlc/ config presence
        id: enrich
        run: |
          if [ -d .ai-sdlc ] && [ -n "$(ls -A .ai-sdlc 2>/dev/null)" ]; then
            echo "flag=--enrich-from-state" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Score issue with PPA
        id: admit
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set +e
          RESULT=$(pnpm --filter @ai-sdlc/dogfood admit \
            --title "$ISSUE_TITLE" \
            --body-file /tmp/issue-body.txt \
            --issue-number '${{ github.event.issue.number }}' \
            --labels '${{ toJSON(github.event.issue.labels.*.name) }}' \
            --reactions '${{ github.event.issue.reactions.total_count }}' \
            --comments '${{ github.event.issue.comments }}' \
            --created-at '${{ github.event.issue.created_at }}' \
            --author-association '${{ github.event.issue.author_association }}' \
            --author-login '${{ github.event.issue.user.login }}' \
            ${{ steps.enrich.outputs.flag }} \
            2>/tmp/admit-stderr.txt | tail -1)
          EXIT_CODE=$?
          set -e
          if [ -s /tmp/admit-stderr.txt ]; then
            echo "::group::Admission stderr"
            cat /tmp/admit-stderr.txt
            echo "::endgroup::"
          fi
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Process admission result
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          ADMISSION_JSON: ${{ steps.admit.outputs.result }}
        with:
          github-token: ${{ secrets.AI_SDLC_PAT }}
          script: |
            let result;
            try {
              result = JSON.parse(process.env.ADMISSION_JSON || '');
            } catch {
              core.warning('Admission output is not valid JSON — skipping');
              return;
            }

            // Schema validation
            if (typeof result.admitted !== 'boolean' ||
                typeof result.reason !== 'string' ||
                typeof result.score !== 'object') {
              core.warning('Admission schema mismatch — skipping');
              return;
            }

            if (result.admitted) {
              // Add security-triage label to trigger next step
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: ['security-triage']
              });
              core.info(`Issue admitted (score: ${result.score.composite.toFixed(4)}) — added security-triage label`);
            } else {
              // Post score breakdown comment with suggestions
              const d = result.score.dimensions;
              let body = `## AI-SDLC: Issue Admission\n\n`;
              body += `**Status:** Not yet eligible for automated processing\n`;
              body += `**Score:** ${result.score.composite.toFixed(4)}\n`;
              body += `**Confidence:** ${(result.score.confidence * 100).toFixed(0)}%\n\n`;

              body += `### Score Breakdown\n\n`;
              body += `| Dimension | Score |\n|---|---|\n`;
              body += `| Soul Alignment | ${d.soulAlignment.toFixed(2)} |\n`;
              body += `| Demand Pressure | ${d.demandPressure.toFixed(2)} |\n`;
              body += `| Execution Reality | ${d.executionReality.toFixed(2)} |\n`;
              body += `| Human Curve | ${d.humanCurve.toFixed(2)} |\n\n`;

              // Pillar breakdown (RFC-0008 §A.6)
              if (result.pillarBreakdown) {
                const pb = result.pillarBreakdown;
                body += `### Pillar Breakdown\n\n`;
                body += `| Pillar | Signal | Interpretation |\n|---|---|---|\n`;
                body += `| Product | ${pb.product.signal.toFixed(2)} | ${pb.product.interpretation} |\n`;
                body += `| Design | ${pb.design.signal.toFixed(2)} | ${pb.design.interpretation} |\n`;
                body += `| Engineering | ${pb.engineering.signal.toFixed(2)} | ${pb.engineering.interpretation} |\n\n`;
                if (pb.tensions && pb.tensions.length > 0) {
                  body += `### Pillar Tensions\n\n`;
                  for (const t of pb.tensions) {
                    body += `- **${t.type}** — ${t.suggestedAction}\n`;
                  }
                  body += '\n';
                }
              }

              body += `**Reason:** ${result.reason}\n\n`;

              if (result.suggestions && result.suggestions.length > 0) {
                body += `### How to Improve\n\n`;
                for (const s of result.suggestions) {
                  body += `- ${s}\n`;
                }
                body += '\n';
              }

              body += `---\n`;
              body += `> Edit the issue to address the suggestions above. It will be re-scored automatically.\n\n`;
              body += `*Scored by [AI-SDLC PPA](https://github.com/ai-sdlc-framework/ai-sdlc)*`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body
              });
            }
