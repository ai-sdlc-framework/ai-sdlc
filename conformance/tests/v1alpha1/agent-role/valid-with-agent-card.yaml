apiVersion: ai-sdlc.io/v1alpha1
kind: AgentRole
metadata:
  name: remote-agent
  annotations:
    ai-sdlc.io/runtime: remote
spec:
  role: Remote Code Reviewer
  goal: Review pull requests for quality and security issues
  tools:
    - code-analysis
    - security-scanner
  agentCard:
    endpoint: https://agents.example.com/reviewer
    version: '2.0'
    securitySchemes:
      - oauth2
      - api-key
