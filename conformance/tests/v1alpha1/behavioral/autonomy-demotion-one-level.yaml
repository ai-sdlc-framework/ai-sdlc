kind: BehavioralTest
apiVersion: ai-sdlc.io/v1alpha1
description: 'High rollback rate triggers demotion by one level'
metadata:
  conformanceLevel: full
test:
  type: autonomy-demotion
  input:
    policy:
      apiVersion: ai-sdlc.io/v1alpha1
      kind: AutonomyPolicy
      metadata:
        name: standard-progression
      spec:
        levels:
          - level: 0
            name: Supervised
            permissions:
              read: ['*']
              write: []
              execute: []
            guardrails:
              requireApproval: all
            monitoring: continuous
          - level: 2
            name: Autonomous
            permissions:
              read: ['*']
              write: ['*']
              execute: ['*']
            guardrails:
              requireApproval: none
            monitoring: audit-log
        promotionCriteria: {}
        demotionTriggers:
          - trigger: high-rollback-rate
            action: demote-one-level
            cooldown: 3d
    agent:
      name: coder-agent
      currentLevel: 2
      totalTasksCompleted: 80
      metrics: {}
      approvals: []
    activeTrigger: high-rollback-rate
  expected:
    demoted: true
    fromLevel: 2
    toLevel: 1
