apiVersion: ai-sdlc.io/v1alpha1
kind: AutonomyPolicy
metadata:
  name: cost-aware-autonomy
  namespace: team-alpha
  labels:
    team.example.com/tier: production
  annotations:
    ai-sdlc.io/rfc: '0004'
spec:
  levels:
    - level: 0
      name: Observer
      description: Read-only access, all actions require approval
      permissions:
        read: ['**']
        write: []
        execute: []
      guardrails:
        requireApproval: all
        transactionLimit: '$10/day'
      monitoring: continuous
      minimumDuration: null
    - level: 1
      name: Junior
      permissions:
        read: ['**']
        write: ['src/**']
        execute: ['test-suite']
      guardrails:
        requireApproval: all
        maxLinesPerPR: 200
        transactionLimit: '$50/day'
      monitoring: continuous
      minimumDuration: '4w'
    - level: 2
      name: Senior
      permissions:
        read: ['**']
        write: ['src/**', 'tests/**']
        execute: ['test-suite', 'lint', 'build']
      guardrails:
        requireApproval: security-critical-only
        maxLinesPerPR: 500
        transactionLimit: '$100/day'
      monitoring: real-time-notification
      minimumDuration: '8w'
  promotionCriteria:
    0-to-1:
      minimumTasks: 10
      conditions:
        - metric: pr-approval-rate
          operator: '>='
          threshold: 0.90
      requiredApprovals:
        - tech-lead
    1-to-2:
      minimumTasks: 50
      conditions:
        - metric: pr-approval-rate
          operator: '>='
          threshold: 0.95
        - metric: ai_sdlc.cost.cost_vs_estimate
          operator: '<='
          threshold: 1.5
      requiredApprovals:
        - engineering-manager
  demotionTriggers:
    - trigger: critical-security-incident
      action: demote-to-0
      cooldown: 4w
    - trigger: cost-overrun
      action: demote-one-level
      cooldown: 1w
      condition:
        metric: ai_sdlc.cost.budget_consumed
        operator: '>='
        threshold: 1.0
        window: 3
      notification: cost-overrun-alert
    - trigger: excessive-retry-waste
      action: demote-one-level
      cooldown: 2w
      condition:
        metric: ai_sdlc.cost.retry_waste
        operator: '>='
        threshold: 50
      notification: retry-waste-alert
