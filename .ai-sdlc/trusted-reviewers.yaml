# Trusted contributor signing keys for review attestations (AISDLC-74).
#
# Each entry is a public key whose corresponding private key lives under
# `~/.ai-sdlc/signing-key.pem` on a contributor's machine. CI's
# `verify-attestation.yml` workflow reads this file, tries the signature on
# `.ai-sdlc/attestations/<head-sha>.dsse.json` against ANY-OF-N pubkeys here,
# and short-circuits the duplicate review run when one matches.
#
# Adding a contributor is a normal PR review:
#   1. Run `/ai-sdlc init-signing-key` on your machine.
#   2. Open a PR appending an entry below using the YAML block the command
#      printed.
#   3. A maintainer reviews + merges (just like any policy change).
#   4. After merge, `/ai-sdlc execute` will produce attestations CI accepts.
#
# Schema (operator entries only post-AISDLC-383.7):
#
# OPERATOR ENTRY (signs the outer DSSE envelope, v5 and v6):
#   - identity:  free-form string (typically email or GitHub handle)
#   - machine:   free-form label (lets one identity register multiple keys)
#   - pubkey:    PEM-encoded ed25519 public key (multi-line block scalar)
#   - addedAt:   ISO 8601 date the entry was added
#   - addedBy:   GitHub handle of the maintainer who approved this entry's PR
#
# AISDLC-383.7: the per-reviewer "REVIEWER ENTRY" type was retired alongside
# the AISDLC-380 sub-attestation gate. v6 envelopes derive reviewer evidence
# from committed transcript leaves signed by the operator's key — no separate
# per-reviewer key is required. Any historical entries with `type: 'reviewer'`
# present in this file are inert and can be removed in a follow-up PR.
#
# REMOVING an entry: open a PR deleting the row. Existing attestations signed
# by the removed key become invalid retroactively (CI rejects them on the
# next push), so coordinate with the contributor before removing.
#
# ─── Format note (LOAD-BEARING) ───────────────────────────────────
# CI's `scripts/verify-attestation.mjs` uses a hand-rolled YAML loader
# to keep the verify-attestation workflow's install footprint minimal
# (no `js-yaml` dep). The loader REQUIRES the strict format below:
#   - Every scalar value single-quoted (`identity: 'a@b.com'`).
#   - `pubkey:` is a `|` block scalar; each PEM line indented exactly 6 spaces.
#   - No tab characters anywhere.
#   - Comments `#` only at column 0.
# Anything fancier (multi-line string folding, nested mappings, anchors,
# etc.) WILL be silently dropped by the loader and your entry will not
# match. If you need a richer YAML feature, add a real YAML lib to the
# verify-attestation workflow's install step first.

reviewers:
  - identity: 'dominique@reliablegenius.io'
    machine: 'doms-macbook'
    addedAt: '2026-04-28'
    addedBy: 'deefactorial'
    pubkey: |
      -----BEGIN PUBLIC KEY-----
      MCowBQYDK2VwAyEA7RfNqQjnRnt7dG0gjIWIkqyfvn+/aMycmbaEbq7lS7E=
      -----END PUBLIC KEY-----

# ─── RFC-0043 Phase 1 — Author allowlist extension ────────────────────────────
#
# The `allowlist.authors` block is read by the RFC-0043 Stage 0 trust
# classifier (`pipeline-cli/src/pipeline/trust-classifier.ts`).
#
# OQ-1 resolution: this file is the ONLY runtime source of trust truth —
# NO live GitHub API queries on the trust-classification critical path.
# Drift between this file and GitHub repo permissions is detected by the
# scheduled `.github/workflows/trusted-reviewers-drift.yml` workflow and
# surfaced as a RFC-0035 G0 Decision for operator action.
#
# Schema (RFC-0043 Phase 1):
#   allowlist:
#     authors:
#       - login:   GitHub login of the trusted author (required)
#         name:    Display name (optional, human readability only)
#         addedAt: ISO 8601 date the entry was added (optional)
#         addedBy: GitHub handle of the approving maintainer (optional)
#
# Format note: the allowlist block uses js-yaml (pipeline-cli dep) rather
# than the hand-rolled loader used for `reviewers:` keys above — richer
# YAML features (unquoted strings, etc.) are safe here.
#
# Adding a trusted author:
#   1. Open a PR adding an entry below.
#   2. A maintainer with write+ permission reviews + merges.
#   3. After merge, the trust classifier will classify the author as TRUSTED.
#
# RFC-0022 composition:
#   - reviewerAuthorityModel: open        → allowlist is unused (everyone trusted)
#   - reviewerAuthorityModel: allowlist   → only listed authors trusted
#   - reviewerAuthorityModel: allowlist+role → only listed authors trusted
#
# When no .ai-sdlc/compliance.yaml exists, the default model is 'open'
# (everyone trusted; UCVG opt-in only).

allowlist:
  authors:
    - login: deefactorial
      name: Dominique Legault
      addedAt: '2026-06-02'
      addedBy: deefactorial
