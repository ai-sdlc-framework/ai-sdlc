# RFC-0035 §15.1 — Decision Catalog config (defaults shown; override what differs)
#
# Copy this file to .ai-sdlc/decisions-config.yaml to override the framework
# defaults. Every field below is optional — omit any field to inherit the
# default. Per OQ design pattern 6 ("per-organization configurability is
# mandatory"), every threshold, capacity slot, label set, and digest mode is
# overridable here.
#
# Generated by: ai-sdlc init (RFC-0035 Phase 10 — AISDLC-294)

# ── Stage C LLM confidence (RFC-0035 §5.3 / Phase 5) ────────────────────────
# Stage C auto-applies when the LLM's self-reported confidence on the
# `decision-recommendation` task meets or exceeds this value AND the decision
# is reversible. Per-org tunable independently of the substrate's
# classifier.confidenceThreshold so Decision Catalog caution can differ from
# capture-triage caution.
stageCConfidenceThreshold: 0.7 # default: 0.7

# ── Research subagent confidence floor (RFC-0035 Phase 10 — AISDLC-294) ─────
# When Stage C's recommendation confidence falls STRICTLY BELOW this value,
# the framework MAY invoke an on-demand research subagent (RFC §8.2) via the
# injected ResearchSubagentInvoker. Production wires the invoker from the
# library API — `cli-decisions research <id>` is read-only.
#
# MUST be < stageCConfidenceThreshold so the "low-confidence / research"
# band lives strictly below the "auto-apply" band.
researchSubagentConfidenceThreshold: 0.6 # default: 0.6

# ── Override window (RFC-0035 OQ-3 / Phase 5) ───────────────────────────────
# How many hours the operator has to override a reversible auto-applied
# Stage C recommendation before it is considered "settled". Silence past the
# window promotes the corpus entry to a positive exemplar.
overrideWindowHours: 24 # default: 24

# ── Capacity (RFC-0035 §7.1 / Phase 7) ──────────────────────────────────────
# Per-tier daily decision budgets. Composes with RFC-0016 t-shirt sizing
# (XS / S / M / L / XL) — Decision Catalog does NOT define a parallel
# sizing taxonomy.
capacity:
  xs: { perDay: 30, estMinutes: 2 } # default xs: 30/day, est 2min/decision
  s: { perDay: 15, estMinutes: 5 } # default s : 15/day, est 5min
  m: { perDay: 6, estMinutes: 10 } # default m : 6/day,  est 10min
  l: { perDay: 2, estMinutes: 20 } # default l : 2/day,  est 20min
  xl: { perDay: 1, estMinutes: 30 } # default xl: 1/day,  est 30min
  # OQ-2 load-bearing formula. `log-blocked-count` (default) gives diminishing
  # returns; `linear` is the naive fallback for shallow dep graphs.
  loadBearingFormula: log-blocked-count

# ── Fatigue (RFC-0035 §7.2 / Phase 7) ───────────────────────────────────────
# Explicit fatigue declaration is the default contract. Inferred fatigue
# (from override-rate / throughput drop) is opt-in.
fatigue:
  inferFromBehavior: false # default: false (OQ-8 default contract)
  overrideRateThreshold: 0.5 # only used when inferFromBehavior: true
  throughputDropThreshold: 0.4 # only used when inferFromBehavior: true
  measurementWindowHours: 1 # only used when inferFromBehavior: true

# ── Audit digest (RFC-0035 OQ-14 / Phase 7) ─────────────────────────────────
# Which auto-decisions appear in the operator's digest:
#   - overridden-only (default): only auto-decisions the operator later
#     overrode (the cases where the framework was wrong; actionable signal).
#   - all: every auto-decision (compliance-heavy orgs).
#   - anomalous: auto-decisions deviating from the rubric's expected output
#     (requires calibration data to be meaningful).
auditDigest:
  mode: overridden-only

# ── Notification surfaces (RFC-0035 §8 / Phase 8) ───────────────────────────
notification:
  tui:
    enabled: true # show resolution banner in TUI decisions-pending pane
  slack:
    enabled: false # POST to Slack webhook on decision resolution
    webhookUrl: '' # required when enabled: true
  email:
    enabled: false # append pending-email record to notifications.jsonl
    recipients: [] # empty list disables email even if enabled: true


# ── Pillar owners (RFC-0029 / Stage B / Phase 3) ────────────────────────────
# Maps pillar roles to operator identifiers (email or login). Used by the
# actor-routing rubric to surface decisions to the right pillar lead. Omit
# any pillar to leave it unassigned (decisions in that pillar route to the
# operator per §6.2).
#
# pillarOwners:
#   operator:    dominique@example.com
#   engineering: alice@example.com
#   product:     bob@example.com
#   design:      carol@example.com
